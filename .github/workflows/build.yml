name: CI Build

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      working-directory: ./CreatePolyphony
      run: chmod +x ./gradlew

    - name: Build with Gradle
      working-directory: ./CreatePolyphony
      run: ./gradlew build

    - name: Determine Primary Jar
      working-directory: ./CreatePolyphony/build/libs
      run: |
        PRIMARY_JAR=$(ls *.jar | grep -vE -- '-sources|-dev|-api|-slim' | head -n 1)
        echo "JAR_FILENAME=$PRIMARY_JAR" >> $GITHUB_ENV
        echo "ARTIFACT_NAME=${PRIMARY_JAR%.jar}" >> $GITHUB_ENV

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: CreatePolyphony/build/libs/${{ env.JAR_FILENAME }}
        if-no-files-found: error